services:
  mysql:
    image: mysql:8.0
    container_name: punto-de-apoyo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: punto_de_apoyo
      MYSQL_USER: punto
      MYSQL_PASSWORD: punto
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
